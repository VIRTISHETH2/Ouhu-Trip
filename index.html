<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virti's Oahu Trip</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fdf8f3; }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const CATEGORIES = [
      {
        id: "beaches",
        label: "Beaches & Water",
        icon: "\u{1F30A}",
        color: "#0891b2",
        items: [
          { name: "Hanauma Bay Snorkeling", desc: "Protected marine sanctuary with crystal-clear water and hundreds of fish species. Book timed entry tickets online in advance \u2014 they sell out.", tip: "Go early morning for calmest water" },
          { name: "Lanikai Beach", desc: "Consistently rated one of the best beaches in the world. Powdery white sand, turquoise water, and views of the Mokulua Islands.", tip: "No parking lot \u2014 street park in Kailua and walk" },
          { name: "North Shore Beach Hopping", desc: "Sunset Beach, Pipeline, and Waimea Bay all within a few miles. Massive waves in winter, calm swimming in summer.", tip: "Winter = watch surfers; Summer = swim" },
          { name: "Kailua Beach Park", desc: "Wide, calm, windswept beach perfect for lounging and water sports. Less crowded than Waikiki with better vibes.", tip: "Great for stand-up paddleboarding" },
          { name: "Waimanalo Beach", desc: "Longest continuous white sand beach on Oahu. Locals' favorite, uncrowded, and absolutely stunning.", tip: "Don't leave valuables in car" },
          { name: "Sharks Cove Snorkeling", desc: "Tide pools and snorkeling right off the rocks on the North Shore. Amazing marine life in a natural lava rock formation.", tip: "Summer only \u2014 winter waves are dangerous here" },
          { name: "Waikiki Beach", desc: "Iconic but still worth a visit. Best at sunrise before the crowds, or at sunset with a drink in hand.", tip: "Walk past the main strip to quieter sections" },
          { name: "Electric Beach (Kahe Point)", desc: "Warm water discharge from nearby power plant attracts dolphins, turtles, and tropical fish. Top-tier snorkeling.", tip: "Dolphins are most common early morning" },
          { name: "Haleiwa Beach Park", desc: "Chill North Shore beach with calm water, sea turtles sunbathing on sand, and a laid-back local feel.", tip: "Turtles rest on the beach \u2014 keep 10ft distance" },
        ],
      },
      {
        id: "water",
        label: "Water Activities",
        icon: "\u{1F93F}",
        color: "#0e7490",
        items: [
          { name: "Shark Cage Diving", desc: "Get in a cage and come face-to-face with Galapagos and sandbar sharks off the North Shore. Thrilling and safe.", tip: "North Shore Shark Adventures is popular" },
          { name: "Kayak to the Mokulua Islands", desc: "Paddle from Lanikai Beach to the twin islands offshore. Land on Moku Nui, explore the hidden beach cove.", tip: "Rent kayaks in Kailua \u2014 go early for calm water" },
          { name: "Stand-Up Paddleboarding", desc: "Kailua Bay and Ala Moana are calm and perfect for beginners. SUP yoga sessions also available.", tip: "Kailua is calmer; Waikiki is more scenic" },
          { name: "Surfing Lessons", desc: "Waikiki has the gentlest waves for learning. North Shore for experienced surfers in winter.", tip: "2-hour group lessons are enough to get up" },
          { name: "Dolphin & Whale Watching Tour", desc: "Spinner dolphins year-round. Humpback whales December through April. Boat tours from Waianae Harbor.", tip: "Whale season peaks Jan\u2013March" },
          { name: "Jet Skiing at Hawaii Water Sports Center", desc: "Guided jet ski tours in Maunalua Bay with views of Koko Head and Diamond Head.", tip: "Must be 16+ to drive" },
          { name: "Catamaran Sunset Sail", desc: "Multiple catamarans depart right from Waikiki Beach. Open bar, sunset views, sometimes dolphins.", tip: "Holokai Catamaran has great reviews" },
          { name: "Scuba Diving", desc: "Shipwrecks, reef dives, and turtle cleaning stations. Great for beginners and certified divers alike.", tip: "Try the Sea Tiger shipwreck dive" },
          { name: "Parasailing over Waikiki", desc: "800\u20131200 ft above the water with panoramic views of Diamond Head, Waikiki, and the mountains.", tip: "Higher altitude = better views and photos" },
          { name: "Vida Mia Yacht Sunset Dinner Cruise", desc: "Classic wooden yacht departing from Waikiki with an onboard chef, open bar, and live local music. Limited to 25 guests so it feels intimate, not touristy. Views of Diamond Head at golden hour.", tip: "Voted USA Today 10Best \u2014 book well ahead" },
          { name: "Private Yacht Charter (Ko Olina)", desc: "Charter a private yacht from Ko Olina Marina on the west side. Crystal-clear water, dolphins, and the most stunning coastline on the island. Fully customizable \u2014 snorkel, chill, or celebrate.", tip: "MANA Cruises and Captain Bruce are top-rated local operators" },
          { name: "Private Sunset Yacht (Waikiki)", desc: "2.5-hour private charter for up to 6 with open bar and fresh dinner. Perfect for a girls' trip or special occasion. Departs right from Waikiki with Diamond Head as your backdrop.", tip: "Books 55+ days out on average \u2014 plan early" },
          { name: "Luxury Snorkel & Sail Yacht Tour", desc: "3-hour private yacht cruise along the Waikiki coastline with snorkeling stops. Swim with sea turtles, spot dolphins, and enjoy the boat all to yourselves.", tip: "Honsail runs popular private options" },
        ],
      },
      {
        id: "hikes",
        label: "Hikes & Nature",
        icon: "\u{1F97E}",
        color: "#059669",
        items: [
          { name: "Diamond Head Summit Trail", desc: "Oahu's most iconic hike. Short but steep climb through a volcanic crater to 360\u00B0 views of Honolulu and the coast.", tip: "Sunrise hike requires early reservation" },
          { name: "Lanikai Pillbox Hike", desc: "Quick 30-min hike to old WWII bunkers with jaw-dropping views of Lanikai Beach and the Mokulua Islands.", tip: "Best at sunrise \u2014 bring a headlamp" },
          { name: "Koko Head Crater Trail", desc: "1,048 railway-tie steps straight up. Brutal cardio but the panoramic summit view is worth every step.", tip: "Start before 7am to beat the heat" },
          { name: "Manoa Falls Trail", desc: "Easy 1.6-mile rainforest walk ending at a 150-foot waterfall. Lush, green, and cinematic.", tip: "Muddy \u2014 wear shoes with grip" },
          { name: "Makapu\u2018u Point Lighthouse Trail", desc: "Paved trail with whale-watching views (in season) leading to a stunning clifftop lighthouse overlook.", tip: "Whales visible Dec\u2013April from the trail" },
          { name: "Ka\u2018ena Point Trail", desc: "Remote 5-mile round trip to Oahu's westernmost tip. Albatross nesting colony, monk seals, wild coastline.", tip: "No shade \u2014 bring lots of water" },
          { name: "Aiea Loop Trail", desc: "4.8-mile loop through lush forest with views of Pearl Harbor and the Koolau Mountains. Peaceful and uncrowded.", tip: "Watch for a WWII plane wreckage along trail" },
          { name: "Olomana Three Peaks", desc: "Advanced ridge hike with ropes and exposure. Three peaks of increasing difficulty. Stunning but serious.", tip: "Most people turn back after Peak 1 \u2014 still worth it" },
          { name: "Kuliouou Ridge Trail", desc: "Moderate hike through forest that opens to panoramic views of the southeast coast. Less crowded gem.", tip: "The final push is steep but short" },
        ],
      },
      {
        id: "sightseeing",
        label: "Sightseeing",
        icon: "\u{1F4F8}",
        color: "#d97706",
        items: [
          { name: "Diamond Head Lookout", desc: "Even if you skip the hike, the lookout point near the lighthouse offers incredible coastal views.", tip: "Free to visit from the road-side lookout" },
          { name: "Tantalus / Puu Ualakaa Lookout", desc: "Drive up to this hilltop park for the best panoramic view of Honolulu, Diamond Head, and the ocean.", tip: "Incredible at sunset" },
          { name: "Makapuu Lookout", desc: "Dramatic coastal cliffs on the eastern tip. Watch for whales in winter and paragliders year-round.", tip: "Stop on the drive to Waimanalo" },
          { name: "Laniakea Beach (Turtle Beach)", desc: "Green sea turtles haul up on the sand to rest here almost every day. Incredible to see up close.", tip: "Volunteers enforce the 10ft distance rule" },
          { name: "Byodo-In Temple", desc: "Stunning Japanese Buddhist temple nestled against the Koolau cliffs in the Valley of the Temples.", tip: "Ring the 3-ton peace bell when you visit" },
          { name: "Halona Blowhole", desc: "Natural lava tube that shoots ocean water 30+ feet into the air. Also has a hidden cove beach below.", tip: "From Here to Eternity beach is below \u2014 scramble down carefully" },
          { name: "Nu\u2018uanu Pali Lookout", desc: "Historic clifftop overlook where King Kamehameha won a decisive battle. Insane winds and sweeping views.", tip: "Hold onto everything \u2014 wind is no joke" },
          { name: "North Shore Scenic Drive", desc: "Full loop through Haleiwa, Sunset Beach, Pipeline, Turtle Bay. The quintessential Oahu road trip.", tip: "Plan 3\u20134 hours with stops" },
          { name: "Dole Plantation", desc: "Pineapple garden maze (world's largest), train ride, and plantation history. Touristy but fun.", tip: "The Dole Whip alone is worth the stop" },
        ],
      },
      {
        id: "culture",
        label: "Culture & History",
        icon: "\u{1F3DB}\uFE0F",
        color: "#7c3aed",
        items: [
          { name: "Pearl Harbor & USS Arizona Memorial", desc: "Powerful, moving experience. The memorial sits directly above the sunken USS Arizona. A must-visit.", tip: "Free timed tickets \u2014 book 60 days ahead" },
          { name: "Iolani Palace", desc: "The only official royal palace on American soil. Home to Hawaii's last reigning monarchs.", tip: "Guided tours are more informative than self-guided" },
          { name: "Bishop Museum", desc: "Hawaii's largest museum covering Polynesian history, Hawaiian culture, and natural science.", tip: "The planetarium show is a hidden gem" },
          { name: "Polynesian Cultural Center", desc: "Six island villages showcasing Pacific Island cultures. Evening luau and fire knife show.", tip: "Book the package with dinner and evening show" },
          { name: "Shangri La Museum of Islamic Art", desc: "Doris Duke's stunning oceanfront estate showcasing Islamic art from around the world. Architectural marvel.", tip: "Must book through Honolulu Museum of Art" },
          { name: "Honolulu Museum of Art", desc: "World-class collection spanning 5,000 years. Beautiful courtyard architecture and rotating exhibits.", tip: "Free first Wednesday of every month" },
          { name: "Hawaii State Art Museum", desc: "Free museum in historic downtown Honolulu featuring Hawaii-based artists and rotating exhibits.", tip: "Quick visit \u2014 pair with Iolani Palace" },
          { name: "King Kamehameha Statue", desc: "Iconic golden statue of Hawaii's first king, draped in leis. In front of Aliiolani Hale.", tip: "Best photos in morning light" },
          { name: "Waikiki Historic Trail", desc: "Self-guided walk through Waikiki's history via surfboard-shaped markers telling stories of the area.", tip: "Free \u2014 download the guide online" },
        ],
      },
      {
        id: "experiences",
        label: "Unique Experiences",
        icon: "\u2728",
        color: "#db2777",
        items: [
          { name: "Sunrise at Lanikai Pillbox", desc: "Wake up early for one of the most beautiful sunrises on the island from above Lanikai Beach.", tip: "Leave by 5:15am" },
          { name: "Sunset Sail off Waikiki", desc: "End a day on the water watching the sun drop behind the horizon with Diamond Head silhouetted.", tip: "Bring a light layer \u2014 ocean breeze gets cool" },
          { name: "Swim with Sea Turtles", desc: "North Shore and Electric Beach are reliable spots to snorkel alongside Hawaiian green sea turtles.", tip: "Never touch or chase \u2014 just float nearby" },
          { name: "Skydiving on the North Shore", desc: "Tandem skydive over the North Shore with views of the entire island, mountains, and ocean.", tip: "Pacific Skydiving Center has great reviews" },
          { name: "Full Moon Hike", desc: "Several trails are stunning under moonlight \u2014 Makapuu Lighthouse Trail is the most popular for this.", tip: "Check the lunar calendar before booking" },
          { name: "KCC Saturday Farmers Market", desc: "Local produce, crafts, and the best people-watching. A Saturday morning ritual for locals and visitors.", tip: "Get there by 8am for the best selection" },
          { name: "Friday Night Fireworks at Hilton", desc: "Free fireworks show launched from the Hilton Hawaiian Village lagoon every Friday at 7:45pm.", tip: "Watch from Ala Moana Beach Park for a less crowded view" },
          { name: "Lei Making Class", desc: "Learn to make a traditional Hawaiian flower lei. Hands-on cultural experience you can wear after.", tip: "Several hotels and cultural centers offer this" },
          { name: "Stargazing at Ka\u2018ena Point", desc: "Zero light pollution at Oahu's remote western tip. Bring a blanket and look up.", tip: "Go on a new moon night for best visibility" },
        ],
      },
      {
        id: "vibes",
        label: "Vibes & Nightlife",
        icon: "\u{1F33A}",
        color: "#e11d48",
        items: [
          { name: "Duke's Waikiki", desc: "Beachfront bar with live Hawaiian music, strong drinks, and toes-in-the-sand energy right on Waikiki.", tip: "Go for sunset \u2014 live music starts around 4pm" },
          { name: "Kakaako Street Art Walk", desc: "Massive murals by international artists covering entire buildings. One of the best open-air galleries anywhere.", tip: "Self-guided \u2014 walk along Auahi and Cooke St" },
          { name: "Chinatown Art Walk (First Friday)", desc: "Galleries, street performers, pop-up bars, and food on the first Friday of every month in Chinatown.", tip: "Starts at 5pm \u2014 explore till late" },
          { name: "Waikiki Beach Walk at Night", desc: "String lights, live music from nearby bars, ocean breeze. Just wander and soak it in.", tip: "End with gelato or shave ice" },
          { name: "The Hideaway Bar", desc: "Speakeasy-style cocktail bar hidden in Chinatown. Dark, moody, expertly crafted drinks.", tip: "No sign outside \u2014 look for the door" },
          { name: "Maui Brewing Co. Waikiki", desc: "Craft Hawaiian beers on tap with a rooftop patio vibe in the heart of Waikiki.", tip: "Try the Bikini Blonde and Pineapple Mana" },
          { name: "Ala Moana Beach Park Sunset", desc: "Locals' favorite sunset spot. Bring a blanket, sit on the grass, watch the sky turn gold and pink.", tip: "Way less crowded than Waikiki" },
          { name: "Sunrise Yoga on the Beach", desc: "Multiple free and paid sunrise yoga sessions on Waikiki Beach. Start the day right.", tip: "Check local studios for free community sessions" },
          { name: "Royal Hawaiian Center Hula Show", desc: "Free hula performances several evenings a week in the courtyard. Authentic and beautiful.", tip: "Check schedule \u2014 usually Tues/Thurs/Sat" },
        ],
      },
    ];

    function OahuGuide() {
      const [active, setActive] = useState("beaches");
      const [expanded, setExpanded] = useState(null);
      const cat = CATEGORIES.find((c) => c.id === active);

      return (
        React.createElement("div", { style: { fontFamily: "'Cormorant Garamond', Georgia, serif", background: "linear-gradient(170deg, #fdf8f3 0%, #fef6ee 40%, #f9f1e8 100%)", minHeight: "100vh", color: "#000000", padding: "0" } },

          // Header
          React.createElement("div", { style: { textAlign: "center", padding: "48px 24px 20px", position: "relative", overflow: "hidden" } },
            React.createElement("div", { style: { position: "absolute", top: 0, left: 0, right: 0, bottom: 0, background: "radial-gradient(ellipse at 50% 0%, rgba(232,160,72,0.1) 0%, transparent 70%)", pointerEvents: "none" } }),
            React.createElement("p", { style: { fontFamily: "'Outfit', sans-serif", fontSize: "11px", letterSpacing: "5px", textTransform: "uppercase", color: "#000000", marginBottom: "12px", fontWeight: 700 } }, "Your Island Guide"),
            React.createElement("h1", { style: { fontSize: "clamp(36px, 7vw, 56px)", fontWeight: 700, margin: "0 0 8px", lineHeight: 1.1, letterSpacing: "-0.5px", color: "#000000" } },
              "O", React.createElement("span", { style: { fontSize: "0.55em", verticalAlign: "middle", letterSpacing: "2px", fontWeight: 700 } }, "\u02BB"), "ahu"
            ),
            React.createElement("p", { style: { fontFamily: "'Outfit', sans-serif", fontSize: "14px", color: "#000000", fontWeight: 700, letterSpacing: "1px", marginTop: "4px" } },
              CATEGORIES.reduce((s, c) => s + c.items.length, 0) + " things to do"
            )
          ),

          // Category Tabs
          React.createElement("div", { style: { display: "flex", overflowX: "auto", gap: "6px", padding: "8px 16px 16px", WebkitOverflowScrolling: "touch", scrollbarWidth: "none", msOverflowStyle: "none" } },
            CATEGORIES.map((c) => {
              const isActive = c.id === active;
              return React.createElement("button", {
                key: c.id,
                onClick: () => { setActive(c.id); setExpanded(null); },
                style: {
                  flex: "0 0 auto", padding: "10px 16px", borderRadius: "100px",
                  border: isActive ? "2px solid " + c.color : "2px solid rgba(0,0,0,0.12)",
                  background: isActive ? c.color + "18" : "rgba(0,0,0,0.02)",
                  color: isActive ? c.color : "#000000",
                  fontFamily: "'Outfit', sans-serif", fontSize: "12px", fontWeight: 700,
                  cursor: "pointer", whiteSpace: "nowrap", transition: "all 0.25s ease", letterSpacing: "0.3px"
                }
              }, c.icon + " " + c.label);
            })
          ),

          // Items List
          React.createElement("div", { style: { padding: "0 16px 40px", maxWidth: "640px", margin: "0 auto" } },
            React.createElement("div", { style: { display: "flex", alignItems: "center", gap: "10px", marginBottom: "20px", padding: "0 4px" } },
              React.createElement("div", { style: { width: "20px", height: "2px", background: "#000000" } }),
              React.createElement("span", { style: { fontFamily: "'Outfit', sans-serif", fontSize: "11px", textTransform: "uppercase", letterSpacing: "3px", color: "#000000", fontWeight: 700 } }, cat.items.length + " spots")
            ),
            cat.items.map((item, i) => {
              const isOpen = expanded === active + "-" + i;
              return React.createElement("div", {
                key: active + "-" + i,
                onClick: () => setExpanded(isOpen ? null : active + "-" + i),
                style: {
                  marginBottom: "8px",
                  background: isOpen ? "rgba(0,0,0,0.035)" : "rgba(0,0,0,0.015)",
                  borderRadius: "14px",
                  border: isOpen ? "1.5px solid rgba(0,0,0,0.15)" : "1.5px solid rgba(0,0,0,0.06)",
                  cursor: "pointer", transition: "all 0.3s ease", overflow: "hidden"
                }
              },
                React.createElement("div", { style: { display: "flex", alignItems: "center", padding: "16px 18px", gap: "14px" } },
                  React.createElement("span", { style: { fontFamily: "'Outfit', sans-serif", fontSize: "11px", color: "#000000", fontWeight: 700, minWidth: "22px" } }, String(i + 1).padStart(2, "0")),
                  React.createElement("span", { style: { fontSize: "17px", fontWeight: 700, letterSpacing: "-0.2px", flex: 1, color: "#000000" } }, item.name),
                  React.createElement("span", { style: { fontSize: "14px", color: "#000000", transform: isOpen ? "rotate(45deg)" : "rotate(0deg)", transition: "transform 0.3s ease", fontFamily: "'Outfit', sans-serif", fontWeight: 700 } }, "+")
                ),
                isOpen && React.createElement("div", { style: { padding: "0 18px 18px 54px" } },
                  React.createElement("p", { style: { fontFamily: "'Outfit', sans-serif", fontSize: "13.5px", lineHeight: 1.65, color: "#000000", margin: "0 0 14px", fontWeight: 600 } }, item.desc),
                  React.createElement("div", { style: { display: "inline-flex", alignItems: "center", gap: "8px", background: "rgba(0,0,0,0.04)", border: "1px solid rgba(0,0,0,0.1)", borderRadius: "8px", padding: "8px 14px" } },
                    React.createElement("span", { style: { fontSize: "12px" } }, "\u{1F4A1}"),
                    React.createElement("span", { style: { fontFamily: "'Outfit', sans-serif", fontSize: "12px", color: "#000000", fontWeight: 700, letterSpacing: "0.2px" } }, item.tip)
                  )
                )
              );
            })
          ),

          // Footer
          React.createElement("div", { style: { textAlign: "center", padding: "0 24px 48px" } },
            React.createElement("div", { style: { width: "40px", height: "2px", background: "#000000", margin: "0 auto 16px", opacity: 0.3 } }),
            React.createElement("p", { style: { fontFamily: "'Outfit', sans-serif", fontSize: "11px", color: "#000000", letterSpacing: "2px", textTransform: "uppercase", fontWeight: 700 } }, "Virti's Oahu Trip")
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(OahuGuide));
  </script>
</body>
</html>
