<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virti's Oahu Trip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:linear-gradient(170deg,#fdf8f3 0%,#fef6ee 40%,#f9f1e8 100%);min-height:100vh;font-family:'Cormorant Garamond',Georgia,serif;color:#000}
    ::-webkit-scrollbar{display:none}
    .header{text-align:center;padding:48px 24px 20px;position:relative;overflow:hidden}
    .header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(232,160,72,.1) 0%,transparent 70%);pointer-events:none}
    .header-label{font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:#000;margin-bottom:12px;font-weight:700}
    .header-title{font-size:clamp(36px,7vw,56px);font-weight:700;margin:0 0 8px;line-height:1.1;color:#000}
    .header-count{font-family:'Outfit',sans-serif;font-size:14px;color:#000;font-weight:700;letter-spacing:1px;margin-top:4px}
    .tabs{display:flex;overflow-x:auto;gap:6px;padding:8px 16px 16px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .tab{flex:0 0 auto;padding:10px 16px;border-radius:100px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .25s ease;border:2px solid rgba(0,0,0,.12);background:rgba(0,0,0,.02);color:#000}
    .tab.active{background:var(--c-bg);border-color:var(--c);color:var(--c)}
    .list{padding:0 16px 40px;max-width:640px;margin:0 auto}
    .spot-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:0 4px}
    .spot-line{width:20px;height:2px;background:#000}
    .spot-text{font-family:'Outfit',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:3px;color:#000;font-weight:700}
    .item{margin-bottom:8px;background:rgba(0,0,0,.015);border-radius:14px;border:1.5px solid rgba(0,0,0,.06);cursor:pointer;transition:all .3s ease;overflow:hidden}
    .item.open{background:rgba(0,0,0,.035);border-color:rgba(0,0,0,.15)}
    .item-header{display:flex;align-items:center;padding:16px 18px;gap:14px}
    .item-num{font-family:'Outfit',sans-serif;font-size:11px;color:#000;font-weight:700;min-width:22px}
    .item-name{font-size:17px;font-weight:700;flex:1;color:#000}
    .item-plus{font-size:14px;color:#000;transition:transform .3s ease;font-family:'Outfit',sans-serif;font-weight:700}
    .item.open .item-plus{transform:rotate(45deg)}
    .item-body{padding:0 18px 18px 54px;display:none}
    .item.open .item-body{display:block}
    .item-desc{font-family:'Outfit',sans-serif;font-size:13.5px;line-height:1.65;color:#000;margin:0 0 14px;font-weight:600}
    .tip-box{display:inline-flex;align-items:center;gap:8px;background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:8px 14px}
    .tip-text{font-family:'Outfit',sans-serif;font-size:12px;color:#000;font-weight:700}
    .link-row{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px}
    .link-btn{font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;padding:8px 16px;border-radius:100px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:opacity .2s}
    .link-btn:hover{opacity:.85}
    .link-btn.primary{color:#fff}
    .link-btn.secondary{background:transparent}
    .footer{text-align:center;padding:0 24px 48px}
    .footer-line{width:40px;height:2px;background:#000;margin:0 auto 16px;opacity:.3}
    .footer-text{font-family:'Outfit',sans-serif;font-size:11px;color:#000;letter-spacing:2px;text-transform:uppercase;font-weight:700}
  </style>
</head>
<body>
  <div class="header">
    <p class="header-label">Your Island Guide</p>
    <h1 class="header-title">Oʻahu</h1>
    <p class="header-count" id="totalCount"></p>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="list">
    <div class="spot-bar">
      <div class="spot-line"></div>
      <span class="spot-text" id="spotCount"></span>
    </div>
    <div id="items"></div>
  </div>
  <div class="footer">
    <a href="events.html" style="display:inline-block;margin-bottom:20px;padding:14px 28px;background:#000;color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;border-radius:100px;text-decoration:none;letter-spacing:0.5px;transition:opacity .2s" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">📅 View Events Calendar (Apr 22–30) →</a>
    <div class="footer-line"></div>
    <p class="footer-text">Virti's Oahu Trip</p>
  </div>

<script>
const C=[
{id:"beaches",label:"Beaches & Water",icon:"🌊",color:"#0891b2",items:[
{n:"Hanauma Bay Snorkeling",d:"Protected marine sanctuary with crystal-clear water and hundreds of fish species. Book timed entry tickets online in advance — they sell out.",t:"Go early morning for calmest water",l:"https://hanaumabaystatepark.com/",ll:"Book tickets"},
{n:"Lanikai Beach",d:"Consistently rated one of the best beaches in the world. Powdery white sand, turquoise water, and views of the Mokulua Islands.",t:"No parking lot — street park in Kailua and walk"},
{n:"North Shore Beach Hopping",d:"Sunset Beach, Pipeline, and Waimea Bay all within a few miles. Massive waves in winter, calm swimming in summer.",t:"Winter = watch surfers; Summer = swim"},
{n:"Kailua Beach Park",d:"Wide, calm, windswept beach perfect for lounging and water sports. Less crowded than Waikiki with better vibes.",t:"Great for stand-up paddleboarding"},
{n:"Waimanalo Beach",d:"Longest continuous white sand beach on Oahu. Locals' favorite, uncrowded, and absolutely stunning.",t:"Don't leave valuables in car"},
{n:"Sharks Cove Snorkeling",d:"Tide pools and snorkeling right off the rocks on the North Shore. Amazing marine life in a natural lava rock formation.",t:"Summer only — winter waves are dangerous here"},
{n:"Waikiki Beach",d:"Iconic but still worth a visit. Best at sunrise before the crowds, or at sunset with a drink in hand.",t:"Walk past the main strip to quieter sections"},
{n:"Electric Beach (Kahe Point)",d:"Warm water discharge from nearby power plant attracts dolphins, turtles, and tropical fish. Top-tier snorkeling.",t:"Dolphins are most common early morning"},
{n:"Haleiwa Beach Park",d:"Chill North Shore beach with calm water, sea turtles sunbathing on sand, and a laid-back local feel.",t:"Turtles rest on the beach — keep 10ft distance"}
]},
{id:"water",label:"Water Activities",icon:"🤿",color:"#0e7490",items:[
{n:"Shark Cage Diving",d:"Get in a cage and come face-to-face with Galapagos and sandbar sharks off the North Shore. Thrilling and safe.",t:"North Shore Shark Adventures — the original operator",l:"https://sharktourshawaii.com/",ll:"Book shark tour"},
{n:"Kayak to the Mokulua Islands",d:"Paddle from Lanikai Beach to the twin islands offshore. Land on Moku Nui, explore the hidden beach cove.",t:"Rent kayaks in Kailua — go early for calm water"},
{n:"Stand-Up Paddleboarding",d:"Kailua Bay and Ala Moana are calm and perfect for beginners. SUP yoga sessions also available.",t:"Kailua is calmer; Waikiki is more scenic"},
{n:"Surfing Lessons",d:"Waikiki has the gentlest waves for learning. North Shore for experienced surfers in winter.",t:"2-hour group lessons are enough to get up"},
{n:"Dolphin & Whale Watching Tour",d:"Spinner dolphins year-round. Humpback whales December through April. Boat tours from Waianae Harbor.",t:"Whale season peaks Jan–March"},
{n:"Jet Skiing at Hawaii Water Sports Center",d:"Guided jet ski tours in Maunalua Bay with views of Koko Head and Diamond Head.",t:"Must be 16+ to drive"},
{n:"Catamaran Sunset Sail",d:"Multiple catamarans depart right from Waikiki Beach. Open bar, sunset views, sometimes dolphins.",t:"Holokai Catamaran is award-winning",l:"https://www.sailholokai.com/",ll:"Book Holokai"},
{n:"Scuba Diving",d:"Shipwrecks, reef dives, and turtle cleaning stations. Great for beginners and certified divers alike.",t:"Try the Sea Tiger shipwreck dive"},
{n:"Parasailing over Waikiki",d:"800–1200 ft above the water with panoramic views of Diamond Head, Waikiki, and the mountains.",t:"Higher altitude = better views and photos"},
{n:"Vida Mia Yacht Sunset Dinner Cruise",d:"Classic wooden yacht departing from Waikiki with an onboard chef, open bar, and live local music. Limited to 25 guests so it feels intimate, not touristy. Views of Diamond Head at golden hour.",t:"Voted USA Today 10Best — book well ahead",l:"https://www.thevidamia.com/",ll:"Book Vida Mia"},
{n:"Private Yacht Charter (Ko Olina)",d:"Charter a private yacht from Ko Olina Marina on the west side. Crystal-clear water, dolphins, and the most stunning coastline on the island. Fully customizable — snorkel, chill, or celebrate.",t:"MANA Cruises and Captain Bruce are top-rated",l:"https://manacruises.com/",ll:"MANA Cruises",l2:"https://cptbruce.com/",ll2:"Captain Bruce"},
{n:"Private Sunset Yacht (Waikiki)",d:"2.5-hour private charter for up to 6 with open bar and fresh dinner. Perfect for a girls' trip or special occasion. Departs right from Waikiki with Diamond Head as your backdrop.",t:"Books 55+ days out on average — plan early"},
{n:"Luxury Snorkel & Sail Yacht Tour",d:"3-hour private yacht cruise along the Waikiki coastline with snorkeling stops. Swim with sea turtles, spot dolphins, and enjoy the boat all to yourselves.",t:"Honsail runs popular private options",l:"https://honsail.com/",ll:"Book Honsail"}
]},
{id:"hikes",label:"Hikes & Nature",icon:"🥾",color:"#059669",items:[
{n:"Diamond Head Summit Trail",d:"Oahu's most iconic hike. Short but steep climb through a volcanic crater to 360° views of Honolulu and the coast.",t:"Sunrise hike requires early reservation",l:"https://dlnr.hawaii.gov/dsp/parks/oahu/diamond-head-state-monument/",ll:"Reserve entry"},
{n:"Lanikai Pillbox Hike",d:"Quick 30-min hike to old WWII bunkers with jaw-dropping views of Lanikai Beach and the Mokulua Islands.",t:"Best at sunrise — bring a headlamp"},
{n:"Koko Head Crater Trail",d:"1,048 railway-tie steps straight up. Brutal cardio but the panoramic summit view is worth every step.",t:"Start before 7am to beat the heat"},
{n:"Manoa Falls Trail",d:"Easy 1.6-mile rainforest walk ending at a 150-foot waterfall. Lush, green, and cinematic.",t:"Muddy — wear shoes with grip"},
{n:"Makapu'u Point Lighthouse Trail",d:"Paved trail with whale-watching views (in season) leading to a stunning clifftop lighthouse overlook.",t:"Whales visible Dec–April from the trail"},
{n:"Ka'ena Point Trail",d:"Remote 5-mile round trip to Oahu's westernmost tip. Albatross nesting colony, monk seals, wild coastline.",t:"No shade — bring lots of water"},
{n:"Aiea Loop Trail",d:"4.8-mile loop through lush forest with views of Pearl Harbor and the Koolau Mountains. Peaceful and uncrowded.",t:"Watch for a WWII plane wreckage along trail"},
{n:"Olomana Three Peaks",d:"Advanced ridge hike with ropes and exposure. Three peaks of increasing difficulty. Stunning but serious.",t:"Most people turn back after Peak 1 — still worth it"},
{n:"Kuliouou Ridge Trail",d:"Moderate hike through forest that opens to panoramic views of the southeast coast. Less crowded gem.",t:"The final push is steep but short"}
]},
{id:"sightseeing",label:"Sightseeing",icon:"📸",color:"#d97706",items:[
{n:"Diamond Head Lookout",d:"Even if you skip the hike, the lookout point near the lighthouse offers incredible coastal views.",t:"Free to visit from the road-side lookout"},
{n:"Tantalus / Puu Ualakaa Lookout",d:"Drive up to this hilltop park for the best panoramic view of Honolulu, Diamond Head, and the ocean.",t:"Incredible at sunset"},
{n:"Makapuu Lookout",d:"Dramatic coastal cliffs on the eastern tip. Watch for whales in winter and paragliders year-round.",t:"Stop on the drive to Waimanalo"},
{n:"Laniakea Beach (Turtle Beach)",d:"Green sea turtles haul up on the sand to rest here almost every day. Incredible to see up close.",t:"Volunteers enforce the 10ft distance rule"},
{n:"Byodo-In Temple",d:"Stunning Japanese Buddhist temple nestled against the Koolau cliffs in the Valley of the Temples.",t:"Ring the 3-ton peace bell when you visit",l:"https://byodo-in.com/",ll:"Visit site"},
{n:"Halona Blowhole",d:"Natural lava tube that shoots ocean water 30+ feet into the air. Also has a hidden cove beach below.",t:"From Here to Eternity beach is below — scramble down carefully"},
{n:"Nu'uanu Pali Lookout",d:"Historic clifftop overlook where King Kamehameha won a decisive battle. Insane winds and sweeping views.",t:"Hold onto everything — wind is no joke"},
{n:"North Shore Scenic Drive",d:"Full loop through Haleiwa, Sunset Beach, Pipeline, Turtle Bay. The quintessential Oahu road trip.",t:"Plan 3–4 hours with stops"},
{n:"Dole Plantation",d:"Pineapple garden maze (world's largest), train ride, and plantation history. Touristy but fun.",t:"The Dole Whip alone is worth the stop",l:"https://doleplantation.com/",ll:"Visit site"}
]},
{id:"culture",label:"Culture & History",icon:"🏛️",color:"#7c3aed",items:[
{n:"Pearl Harbor & USS Arizona Memorial",d:"Powerful, moving experience. The memorial sits directly above the sunken USS Arizona. A must-visit.",t:"Free timed tickets — book 60 days ahead",l:"https://www.nps.gov/perl/planyourvisit/index.htm",ll:"Reserve free tickets"},
{n:"Iolani Palace",d:"The only official royal palace on American soil. Home to Hawaii's last reigning monarchs.",t:"Guided tours are more informative than self-guided",l:"https://www.iolanipalace.org/",ll:"Book tour"},
{n:"Bishop Museum",d:"Hawaii's largest museum covering Polynesian history, Hawaiian culture, and natural science.",t:"The planetarium show is a hidden gem",l:"https://www.bishopmuseum.org/",ll:"Visit site"},
{n:"Polynesian Cultural Center",d:"Six island villages showcasing Pacific Island cultures. Evening luau and fire knife show.",t:"Book the package with dinner and evening show",l:"https://www.polynesia.com/",ll:"Book tickets"},
{n:"Shangri La Museum of Islamic Art",d:"Doris Duke's stunning oceanfront estate showcasing Islamic art from around the world. Architectural marvel.",t:"Must book through Honolulu Museum of Art",l:"https://www.shangrila.org/",ll:"Book tour"},
{n:"Honolulu Museum of Art",d:"World-class collection spanning 5,000 years. Beautiful courtyard architecture and rotating exhibits.",t:"Free first Wednesday of every month",l:"https://honolulumuseum.org/",ll:"Visit site"},
{n:"Hawaii State Art Museum",d:"Free museum in historic downtown Honolulu featuring Hawaii-based artists and rotating exhibits.",t:"Quick visit — pair with Iolani Palace"},
{n:"King Kamehameha Statue",d:"Iconic golden statue of Hawaii's first king, draped in leis. In front of Aliiolani Hale.",t:"Best photos in morning light"},
{n:"Waikiki Historic Trail",d:"Self-guided walk through Waikiki's history via surfboard-shaped markers telling stories of the area.",t:"Free — download the guide online"}
]},
{id:"experiences",label:"Unique Experiences",icon:"✨",color:"#db2777",items:[
{n:"Sunrise at Lanikai Pillbox",d:"Wake up early for one of the most beautiful sunrises on the island from above Lanikai Beach.",t:"Leave by 5:15am"},
{n:"Sunset Sail off Waikiki",d:"End a day on the water watching the sun drop behind the horizon with Diamond Head silhouetted.",t:"Bring a light layer — ocean breeze gets cool"},
{n:"Swim with Sea Turtles",d:"North Shore and Electric Beach are reliable spots to snorkel alongside Hawaiian green sea turtles.",t:"Never touch or chase — just float nearby"},
{n:"Skydiving on the North Shore",d:"Tandem skydive over the North Shore with views of the entire island, mountains, and ocean.",t:"Two great operators on the North Shore",l:"https://www.pacificskydivinghonolulu.com/en/",ll:"Pacific Skydiving",l2:"https://www.skydivehawaii.com/",ll2:"Skydive Hawaii"},
{n:"Full Moon Hike",d:"Several trails are stunning under moonlight — Makapuu Lighthouse Trail is the most popular for this.",t:"Check the lunar calendar before booking"},
{n:"KCC Saturday Farmers Market",d:"Local produce, crafts, and the best people-watching. A Saturday morning ritual for locals and visitors.",t:"Get there by 8am for the best selection"},
{n:"Friday Night Fireworks at Hilton",d:"Free fireworks show launched from the Hilton Hawaiian Village lagoon every Friday at 7:45pm.",t:"Watch from Ala Moana Beach Park for a less crowded view"},
{n:"Lei Making Class",d:"Learn to make a traditional Hawaiian flower lei. Hands-on cultural experience you can wear after.",t:"Several hotels and cultural centers offer this"},
{n:"Stargazing at Ka'ena Point",d:"Zero light pollution at Oahu's remote western tip. Bring a blanket and look up.",t:"Go on a new moon night for best visibility"}
]},
{id:"vibes",label:"Vibes & Nightlife",icon:"🌺",color:"#e11d48",items:[
{n:"Duke's Waikiki",d:"Beachfront bar with live Hawaiian music, strong drinks, and toes-in-the-sand energy right on Waikiki.",t:"Go for sunset — live music starts around 4pm",l:"https://www.dukeswaikiki.com/",ll:"Duke's site"},
{n:"Kakaako Street Art Walk",d:"Massive murals by international artists covering entire buildings. One of the best open-air galleries anywhere.",t:"Self-guided — walk along Auahi and Cooke St"},
{n:"Chinatown Art Walk (First Friday)",d:"Galleries, street performers, pop-up bars, and food on the first Friday of every month in Chinatown.",t:"Starts at 5pm — explore till late"},
{n:"Waikiki Beach Walk at Night",d:"String lights, live music from nearby bars, ocean breeze. Just wander and soak it in.",t:"End with gelato or shave ice"},
{n:"The Hideaway Bar",d:"Speakeasy-style cocktail bar hidden in Chinatown. Dark, moody, expertly crafted drinks.",t:"No sign outside — look for the door"},
{n:"Maui Brewing Co. Waikiki",d:"Craft Hawaiian beers on tap with a rooftop patio vibe in the heart of Waikiki.",t:"Try the Bikini Blonde and Pineapple Mana",l:"https://mauibrewingco.com/",ll:"Maui Brewing"},
{n:"Ala Moana Beach Park Sunset",d:"Locals' favorite sunset spot. Bring a blanket, sit on the grass, watch the sky turn gold and pink.",t:"Way less crowded than Waikiki"},
{n:"Sunrise Yoga on the Beach",d:"Multiple free and paid sunrise yoga sessions on Waikiki Beach. Start the day right.",t:"Check local studios for free community sessions"},
{n:"Royal Hawaiian Center Hula Show",d:"Free hula performances several evenings a week in the courtyard. Authentic and beautiful.",t:"Check schedule — usually Tues/Thurs/Sat",l:"https://www.royalhawaiiancenter.com/",ll:"See schedule"}
]}
];

let active="beaches",openId=null;
const $=s=>document.getElementById(s);
const total=C.reduce((s,c)=>s+c.items.length,0);
$("totalCount").textContent=total+" things to do";

function render(){
  const cat=C.find(c=>c.id===active);
  // tabs
  $("tabs").innerHTML=C.map(c=>{
    const act=c.id===active;
    const bg=act?c.color+"18":"rgba(0,0,0,0.02)";
    const bd=act?c.color:"rgba(0,0,0,0.12)";
    const cl=act?c.color:"#000";
    return `<button class="tab${act?" active":""}" style="--c:${c.color};--c-bg:${c.color}18;border-color:${bd};background:${bg};color:${cl}" data-id="${c.id}">${c.icon} ${c.label}</button>`;
  }).join("");
  $("tabs").querySelectorAll(".tab").forEach(b=>b.onclick=()=>{active=b.dataset.id;openId=null;render()});

  // count
  $("spotCount").textContent=cat.items.length+" spots";

  // items
  $("items").innerHTML=cat.items.map((it,i)=>{
    const isOpen=openId===active+"-"+i;
    const num=String(i+1).padStart(2,"0");
    let links="";
    if(it.l){
      links=`<div class="link-row"><a class="link-btn primary" style="background:${cat.color}" href="${it.l}" target="_blank" rel="noopener noreferrer">${it.ll} ↗</a>`;
      if(it.l2) links+=`<a class="link-btn secondary" style="color:${cat.color};border:2px solid ${cat.color}" href="${it.l2}" target="_blank" rel="noopener noreferrer">${it.ll2} ↗</a>`;
      links+=`</div>`;
    }
    return `<div class="item${isOpen?" open":""}" data-idx="${i}">
      <div class="item-header">
        <span class="item-num">${num}</span>
        <span class="item-name">${it.n}</span>
        <span class="item-plus">+</span>
      </div>
      <div class="item-body">
        <p class="item-desc">${it.d}</p>
        <div class="tip-box"><span style="font-size:12px">💡</span><span class="tip-text">${it.t}</span></div>
        ${links}
      </div>
    </div>`;
  }).join("");

  $("items").querySelectorAll(".item").forEach(el=>{
    el.onclick=function(e){
      if(e.target.closest("a")) return;
      const idx=this.dataset.idx;
      const key=active+"-"+idx;
      openId=openId===key?null:key;
      render();
    };
  });
}
render();
</script>
</body>
</html>
