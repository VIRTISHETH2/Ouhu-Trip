  const d=D[ai];
  $("tabs").innerHTML=D.map((dy,i)=>`<button class="tab${i===ai?" a":""}" data-i="${i}"><div class="dy">${dy.day.slice(0,3)}</div>${dy.date}<div class="ct">${dy.ev.length}</div></button>`).join("");
  $("tabs").querySelectorAll(".tab").forEach(b=>b.onclick=()=>{ai=+b.dataset.i;r()});
  $("dh").innerHTML=`<h2>${d.day}, ${d.date}</h2>${d.label?`<span class="lb">${d.label}</span>`:""}<div class="ec">${d.ev.length} event${d.ev.length!==1?"s":""}</div>`;
  $("lst").innerHTML=d.ev.map(e=>{
    const c=TC[e.g]||"#666";
    return `<div class="ev">
      <div class="ev-top"><h3>${e.n}</h3><span class="tg" style="background:${c}">${e.g}</span></div>
      <div class="ev-meta"><span>🕐 ${e.t}</span><span>📍 ${e.w}</span></div>
      <p>${e.d}</p>
      ${e.l?`<a href="${e.l}" target="_blank" rel="noopener noreferrer" style="color:${c};background:${c}12;border:1.5px solid ${c}30">More info ↗</a>`:""}
    </div>`;
  }).join("");
}
r();
</script>
</body>
</html>
